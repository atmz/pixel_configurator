<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixel41 Bathroom Configurator</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="bathroom.css">
</head>
<body>
  <header>
    <div class="header-left">
      <button id="sidebar-toggle" class="sidebar-toggle" title="Toggle sidebar">&#9776;</button>
      <h1>Bathroom Configurator</h1>
    </div>
    <div class="header-actions">
      <a href="index.html" class="back-link">General Configurator</a>
      <button id="export-png" title="Export 3D view as PNG">Export PNG</button>
    </div>
  </header>

  <main>
    <aside class="sidebar">
      <section class="panel">
        <h2>Colors</h2>
        <div id="palette" class="palette"></div>
        <div id="color-info" class="color-info">Select a color</div>
        <div class="base-color-row">
          <span class="base-label">Base</span>
          <div id="base-swatch" class="base-swatch"></div>
          <span id="base-info" class="base-info"></span>
          <button id="set-base" class="set-base-btn">Set from selected</button>
        </div>
      </section>

      <section class="panel">
        <h2>Grout</h2>
        <div id="grout-palette" class="grout-palette"></div>
        <label class="range-label">
          Joint width
          <input type="range" id="grout-width" min="0" max="8" value="3.5" step="0.5">
          <span id="grout-width-label">3.5 mm</span>
        </label>
      </section>

      <section class="panel">
        <h2>Tools</h2>
        <div class="tools">
          <button class="tool-btn active" data-tool="paint" title="Paint (P)">&#9998; Paint</button>
          <button class="tool-btn" data-tool="fill" title="Bucket Fill (F)">&#9726; Fill</button>
          <button class="tool-btn" data-tool="erase" title="Eraser (E)">&#9003; Erase</button>
          <button class="tool-btn" data-tool="eyedrop" title="Eyedropper (I)">&#9738; Pick</button>
        </div>
      </section>

      <section class="panel">
        <h2>Room Presets</h2>
        <div id="room-presets" class="presets"></div>
      </section>

      <section class="panel">
        <h2>Pattern</h2>
        <div class="grid-controls">
          <label>
            Cols
            <input type="number" id="pat-cols" value="2" min="1" max="16">
          </label>
          <label>
            Rows
            <input type="number" id="pat-rows" value="2" min="1" max="16">
          </label>
          <button id="pat-resize">Set</button>
        </div>
        <div id="pattern-grid" class="grid-container pattern-grid-editor"></div>
        <div id="pat-presets" class="presets" style="margin-top:6px"></div>
        <div class="actions" style="margin-top:6px">
          <button id="pat-apply">Apply to surface</button>
          <button id="pat-apply-all">Apply to all</button>
        </div>
      </section>

      <section class="panel">
        <h2>Actions</h2>
        <div class="actions">
          <button id="clear-all">Clear All</button>
          <button id="fill-all">Fill All</button>
        </div>
      </section>

      <section class="panel">
        <h2>Surface</h2>
        <div class="surface-selector" id="surface-selector"></div>
      </section>

      <section class="panel">
        <h2>Order Summary</h2>
        <div class="order-meta" id="order-meta"></div>
        <table id="order-table">
          <thead>
            <tr>
              <th></th>
              <th>Color</th>
              <th>Tiles</th>
              <th>Boxes</th>
              <th>Grout</th>
            </tr>
          </thead>
          <tbody id="order-body"></tbody>
          <tfoot id="order-foot"></tfoot>
        </table>
      </section>
    </aside>

    <div class="content-area">
      <section class="room-3d-section">
        <h2>3D Room View <span class="hint">drag to rotate</span></h2>
        <div id="room-3d-container" class="room-3d-container">
          <canvas id="room-3d" width="900" height="600"></canvas>
        </div>
      </section>

      <section class="surfaces-section">
        <h2>Surface Editors</h2>
        <div class="surface-tabs" id="surface-tabs"></div>
        <div class="surface-editor-area">
          <div id="surface-label" class="surface-label"></div>
          <div id="surface-grid" class="grid-container"></div>
          <div id="surface-dims" class="grid-dims"></div>
        </div>
      </section>
    </div>
  </main>

  <script src="bathroom.js"></script>
</body>
</html>
